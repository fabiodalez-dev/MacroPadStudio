orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-enter",  "cmd-shift-enter",  "cmd-z"]       # Start prototype / Restart flow / Undo
    knobs:
      - ccw: "cmd-minus"   # zoom out
        press: "cmd-0"     # fit canvas to window
        cw: "cmd-equal"    # zoom in
