orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",  "cmd-shift-z",  "cmd-y"]       # Undo / Redo / Toggle GPU preview
    knobs:
      - ccw: "leftbracket"    # decrease brush size
        press: "escape"       # exit current tool
        cw: "rightbracket"    # increase brush size
