orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-alt-k",  "cmd-alt-b",  "cmd-z"]       # Create component / Detach instance / Undo
    knobs:
      - ccw: "cmd-minus"   # zoom out
        press: "cmd-0"     # fit canvas to window
        cw: "cmd-equal"    # zoom in
