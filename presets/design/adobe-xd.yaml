orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-h",  "cmd-g",        "cmd-z"]       # Flip horizontal / Group / Undo
    knobs:
      - ccw: "cmd-minus"  # zoom out
        press: "cmd-0"    # fit canvas to window (Fit Page)
        cw: "cmd-equal"   # zoom in
