orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-leftbracket",   # navigate back
         "cmd-rightbracket",  # navigate forward
         "cmd-r"]             # reload page
    knobs:
      - ccw: "wheelup"        # scroll up
        press: "cmd-l"        # focus address bar
        cw: "wheeldown"       # scroll down
