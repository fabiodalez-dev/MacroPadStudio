orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-f",             # find on page
         "cmd-equal",          # zoom in
         "cmd-minus"]         # zoom out
    knobs:
      - ccw: "wheelup"        # scroll up
        press: "cmd-0"        # reset zoom to 100%
        cw: "wheeldown"       # scroll down
