orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z", "cmd-shift-z", "cmd-shift-f5"]   # Undo / Redo / Present from beginning
    knobs:
      - ccw: "left"      # previous slide
        press: "space"   # advance / pause presentation
        cw: "right"      # next slide
