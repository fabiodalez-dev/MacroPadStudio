orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["cmd-home", "shift-d", "cmd-z"]   # Reset all grades and nodes / toggle bypass color grades / undo grade change
    knobs:
      - ccw: "wheeldown"     # Scroll through clips in color timeline (prev)
        press: "shift-home"  # Reset selected node grade
        cw: "wheelup"        # Scroll through clips in color timeline (next)
