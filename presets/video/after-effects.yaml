orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",        # undo last compositing change
         "cmd-shift-d",  # split layer at current time
         "cmd-shift-z"]  # redo
    knobs:
      - ccw: "left"      # step one frame backward
        press: "space"   # play / pause RAM preview
        cw: "right"      # step one frame forward
