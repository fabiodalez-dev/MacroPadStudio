orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["cmd-shift-c", "cmd-d", "cmd-y"]  # Pre-compose, Duplicate layer, New solid
    knobs:
      - ccw: "minus"        # Zoom out timeline
        press: "cmd-shift-c"  # Pre-compose selected layers
        cw: "equal"          # Zoom in timeline
