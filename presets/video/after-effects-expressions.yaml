orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["e,e", "u", "alt-u"]  # Reveal expressions on selected layers, reveal animated properties, reveal keyframes and expressions
    knobs:
      - ccw: "cmd-z"        # Undo expression edit
        press: "enter"       # Confirm / apply expression
        cw: "cmd-shift-z"    # Redo expression edit
