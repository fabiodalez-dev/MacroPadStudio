orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-4",              # show Audio inspector
         "cmd-9",              # open Audio enhancements
         "ctrl-shift-s"]       # detach audio from video
    knobs:
      - ccw: "volumedown"      # decrease system monitor volume
        press: "mute"          # toggle mute
        cw: "volumeup"         # increase system monitor volume
