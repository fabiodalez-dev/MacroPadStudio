orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["z", "ctrl-shift-h", "cmd-shift-w"]   # Zoom to fit viewer / show/hide histogram / toggle video scopes panel
    knobs:
      - ccw: "wheeldown"   # Scroll scope display down / decrease scope brightness
        press: "z"         # Zoom to fit color page viewer
        cw: "wheelup"      # Scroll scope display up / increase scope brightness
