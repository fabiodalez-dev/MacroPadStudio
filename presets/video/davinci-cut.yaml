orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",        # undo last action
         "f9",           # smart insert at nearest edit point
         "cmd-shift-z"]  # redo
    knobs:
      - ccw: "left"      # step one frame backward
        press: "space"   # play / pause
        cw: "right"      # step one frame forward
