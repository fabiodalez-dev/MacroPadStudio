orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-o",        # open source file
         "cmd-shift-e",  # add to encode queue
         "cmd-shift-z"]  # redo / start encode (Cmd+E)
    knobs:
      - ccw: "volumedown"   # decrease system volume during long encodes
        press: "mute"       # toggle system mute
        cw: "volumeup"      # increase system volume
