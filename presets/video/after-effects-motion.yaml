orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",        # undo last motion design change
         "shift-slash",  # fit composition to viewer
         "cmd-shift-z"]  # redo
    knobs:
      - ccw: "left"      # step one frame backward
        press: "space"   # play / pause RAM preview
        cw: "right"      # step one frame forward
