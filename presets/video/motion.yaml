orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",        # undo last change
         "cmd-5",        # add a behavior to selected object
         "cmd-shift-z"]  # redo
    knobs:
      - ccw: "left"      # step one frame backward
        press: "space"   # play / pause preview
        cw: "right"      # step one frame forward
