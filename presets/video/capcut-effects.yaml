orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",              # undo last effect change
         "cmd-shift-z",        # redo
         "delete"]             # remove selected effect
    knobs:
      - ccw: "left"            # step one frame backward
        press: "space"         # play / pause
        cw: "right"            # step one frame forward
