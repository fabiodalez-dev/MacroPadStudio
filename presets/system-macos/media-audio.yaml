orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["previous",     "play",         "next"]         # previous track / play-pause / next track
    knobs:
      - ccw:   "volumedown"   # decrease system volume
        press: "mute"         # mute/unmute
        cw:    "volumeup"     # increase system volume
