orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["ctrl-up",      "ctrl-down",   "cmd-tab"]      # Mission Control overview / App Exposé / App Switcher
    knobs:
      - ccw:   "ctrl-left"    # switch to previous Space
        press: "ctrl-up"      # open Mission Control
        cw:    "ctrl-right"   # switch to next Space
