orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-3",  "cmd-shift-4",  "cmd-shift-5"]  # full-screen screenshot / area screenshot / screenshot toolbar
    knobs:
      - ccw:   "volumedown"   # decrease volume
        press: "mute"         # mute/unmute
        cw:    "volumeup"     # increase volume
