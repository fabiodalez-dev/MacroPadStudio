orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-f",      "cmd-t",       "cmd-b"]       # Search / Table of contents / Bookmarks
    knobs:
      - ccw: "left"    # previous page
        press: "f"     # toggle full-screen reading
        cw: "right"    # next page
