orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-3",  "cmd-shift-4", "cmd-shift-5"]   # Full screenshot / Region screenshot / Screenshot toolbar
    knobs:
      - ccw:   "volumedown"   # decrease system volume
        press: "mute"         # toggle mute
        cw:    "volumeup"     # increase system volume
