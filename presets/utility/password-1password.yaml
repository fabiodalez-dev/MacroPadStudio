orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-backslash", "cmd-shift-backslash", "cmd-shift-c"] # Autofill / Open 1Password / Copy password
    knobs:
      - ccw:   "up"           # scroll item list up
        press: "enter"        # confirm / autofill selected
        cw:    "down"         # scroll item list down
