orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-n", "cmd-f", "escape"]  # new message / search / back / close
    knobs:
      - ccw: "cmd-up"       # navigate to previous conversation
        press: "enter"      # open selected conversation / send
        cw: "cmd-down"      # navigate to next conversation
