orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-m", "cmd-shift-d", "cmd-shift-v"]  # toggle mute / toggle deafen / toggle voice activity
    knobs:
      - ccw: "volumedown"   # decrease system volume
        press: "mute"       # toggle speaker mute
        cw: "volumeup"      # increase system volume
