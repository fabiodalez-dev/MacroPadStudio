orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-a", "cmd-shift-v", "cmd-shift-h"]  # toggle mute / toggle video / end meeting
    knobs:
      - ccw: "volumedown"   # decrease system volume
        press: "mute"       # toggle speaker mute
        cw: "volumeup"      # increase system volume
