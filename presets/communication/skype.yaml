orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-m", "cmd-shift-k", "escape"]  # toggle mute / toggle video / hang up / go back
    knobs:
      - ccw: "volumedown"   # decrease system volume
        press: "mute"       # toggle speaker mute
        cw: "volumeup"      # increase system volume
