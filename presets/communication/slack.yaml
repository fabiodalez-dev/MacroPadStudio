orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-k", "cmd-shift-m", "cmd-shift-y"]  # quick switcher / mute / set status
    knobs:
      - ccw: "alt-up"       # navigate to previous channel
        press: "enter"      # open / confirm selection
        cw: "alt-down"      # navigate to next channel
