orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-m", "cmd-shift-d", "alt-f4"]  # toggle mute / toggle deafen / disconnect call (close window workaround)
    knobs:
      - ccw: "alt-up"       # navigate to previous channel
        press: "enter"      # open / confirm selection
        cw: "alt-down"      # navigate to next channel
