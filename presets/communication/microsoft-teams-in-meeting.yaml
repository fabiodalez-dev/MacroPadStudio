orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-m", "cmd-shift-o", "cmd-shift-e"]  # toggle mute / toggle camera / raise lower hand
    knobs:
      - ccw: "volumedown"   # decrease system volume
        press: "mute"       # toggle speaker mute
        cw: "volumeup"      # increase system volume
