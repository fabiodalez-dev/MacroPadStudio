orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["y", "cmd-alt-shift-right", "cmd-z"]   # Toggle Before/After / Copy After settings to Before / Undo
    knobs:
      - ccw: "left"                              # Previous photo
        press: "cmd-shift-r"                     # Reset develop settings
        cw: "right"                              # Next photo
