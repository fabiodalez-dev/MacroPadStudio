orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["p",        "x",          "u"]          # Pick (green star) / Reject / Unset color tag
    knobs:
      - ccw: "left"   # previous image in browser
        press: "space" # toggle full-screen viewer
        cw: "right"   # next image in browser
