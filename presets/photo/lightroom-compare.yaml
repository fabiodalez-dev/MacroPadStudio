orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["c", "up", "n"]   # Enter Compare view / Make candidate the select (promote) / Survey view
    knobs:
      - ccw: "left"            # Step to previous pair
        press: "g"             # Return to Grid view
        cw: "right"            # Step to next pair
