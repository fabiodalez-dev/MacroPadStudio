orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",      "cmd-d",      "cmd-shift-e"] # Undo / Deselect all / Export
    knobs:
      - ccw: "left"    # previous image in browser
        press: "space" # toggle full-screen viewer
        cw: "right"    # next image in browser
