orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-t",        "cmd-z",        "cmd-s"]        # Free Transform Smart Object / Undo / Save
    knobs:
      - ccw: "cmd-minus"   # zoom out
        press: "cmd-0"      # fit on screen
        cw: "cmd-equal"     # zoom in
