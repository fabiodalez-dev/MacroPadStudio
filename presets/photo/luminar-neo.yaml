orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",      "cmd-shift-e", "cmd-d"]       # Undo / Export / Duplicate image
    knobs:
      - ccw: "left"    # previous image in catalog
        press: "space" # toggle full-screen preview
        cw: "right"    # next image in catalog
