orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["shift-cmd-h", "o", "cmd-z"]   # Show/hide masks overlay / Show/hide selected mask overlay / Undo
    knobs:
      - ccw: "leftbracket"               # Decrease brush size
        press: "m"                        # Add new mask (Masking shortcut)
        cw: "rightbracket"               # Increase brush size
