orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["h", "o", "cmd-z"]   # Hide/show mask pins / Show/hide mask overlay / Undo
    knobs:
      - ccw: "leftbracket"               # Decrease brush size
        press: "m"                        # New Linear Gradient mask
        cw: "rightbracket"               # Increase brush size
