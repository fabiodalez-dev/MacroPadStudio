orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-alt-l", "cmd-shift-m", "cmd-z"]     # New Layer / Show/hide mask overlay / Undo
    knobs:
      - ccw: "leftbracket"   # decrease brush size
        press: "m"            # toggle mask overlay visibility
        cw: "rightbracket"   # increase brush size
