orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-shift-n", "cmd-g",     "cmd-e"]        # New layer / Group layers / Merge down
    knobs:
      - ccw: "leftbracket"    # decrease brush size
        press: "b"            # select Brush tool
        cw: "rightbracket"    # increase brush size
