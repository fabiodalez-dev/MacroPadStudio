orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["cmd-k", "g", "cmd-z"]   # Lock map markers / Back to Library Grid / Undo
    knobs:
      - ccw: "minus"                          # Zoom out map
        press: "escape"                        # Exit map / return to Library
        cw: "equal"                            # Zoom in map
