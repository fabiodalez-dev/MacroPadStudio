orientation: normal
rows: 1
columns: 3
knobs: 1
layers:
  - buttons:
      - ["cmd-shift-m", "delete", "cmd-z"]   # Add GPS coordinates to selected / Remove GPS coordinates / Undo
    knobs:
      - ccw: "minus"                          # Zoom out map
        press: "escape"                        # Exit map / return to Library
        cw: "equal"                            # Zoom in map
