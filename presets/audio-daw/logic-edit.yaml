orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",          # undo last edit
         "cmd-t",          # split region at playhead
         "cmd-shift-z"]    # redo
    knobs:
      - ccw: "left"        # step playhead backward
        press: "space"     # play / pause
        cw: "right"        # step playhead forward
