orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-a",             # select all notes in piano roll
         "cmd-shift-f",       # open quantize menu
         "cmd-z"]             # undo last piano roll change
    knobs:
      - ccw: "leftbracket"    # decrease note length (shorter grid value)
        press: "space"        # play / stop
        cw: "rightbracket"    # increase note length (longer grid value)
