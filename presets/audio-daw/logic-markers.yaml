orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["opt-quote",         # create marker at playhead position
         "opt-delete",        # delete marker at playhead
         "opt-dot"]           # go to next marker
    knobs:
      - ccw: "opt-comma"      # go to previous marker
        press: "opt-quote"    # create marker at playhead
        cw: "opt-dot"         # go to next marker
