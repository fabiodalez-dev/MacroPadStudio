orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["numpadasterisk",   # toggle record arm
         "space",            # play / stop
         "numpadenter"]      # start recording
    knobs:
      - ccw: "left"          # move playhead backward
        press: "space"       # play / pause
        cw: "right"          # move playhead forward
