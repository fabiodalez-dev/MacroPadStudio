orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["b",                # split at cursor (blade tool)
         "cmd-z",            # undo
         "cmd-shift-z"]      # redo
    knobs:
      - ccw: "left"          # move playhead / selection backward
        press: "space"       # play / pause
        cw: "right"          # move playhead / selection forward
