orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["r",              # arm/toggle record
         "space",          # play / stop
         "shift-r"]        # capture recording (capture as recording)
    knobs:
      - ccw: "left"        # move playhead backward (one bar)
        press: "space"     # play / pause
        cw: "right"        # move playhead forward (one bar)
