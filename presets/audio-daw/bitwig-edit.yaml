orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["e",                # open/close note editor
         "cmd-z",            # undo
         "cmd-shift-z"]      # redo
    knobs:
      - ccw: "left"          # move playhead backward
        press: "space"       # play / pause
        cw: "right"          # move playhead forward
