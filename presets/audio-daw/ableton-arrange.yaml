orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",          # undo last edit
         "cmd-e",          # split clip at playhead
         "cmd-shift-z"]    # redo
    knobs:
      - ccw: "left"        # move playhead backward
        press: "space"     # play / pause
        cw: "right"        # move playhead forward
