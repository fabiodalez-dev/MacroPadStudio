orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-z",          # undo last edit
         "space",          # play / stop
         "cmd-shift-z"]    # redo
    knobs:
      - ccw: "left"        # move playhead position backward
        press: "space"     # play / pause
        cw: "right"        # move playhead position forward
