orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["ctrl-r",           # toggle record arm selected track
         "space",            # play / stop
         "ctrl-shift-r"]     # record (start recording)
    knobs:
      - ccw: "left"          # move playhead backward
        press: "space"       # play / pause
        cw: "right"          # move playhead forward
