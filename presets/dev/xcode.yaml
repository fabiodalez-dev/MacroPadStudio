orientation: normal
rows: 1
columns: 3
knobs: 1

layers:
  - buttons:
      - ["cmd-b",        # build project
         "cmd-r",        # run project
         "cmd-shift-k"]  # clean build folder
    knobs:
      - ccw: "cmd-shift-leftbracket"   # switch to previous editor tab
        press: "cmd-shift-o"           # open quickly (file search)
        cw: "cmd-shift-rightbracket"   # switch to next editor tab
